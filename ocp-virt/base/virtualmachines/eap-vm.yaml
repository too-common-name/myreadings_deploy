apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: eap-vm
  labels:
    app: eap
    role: backend
    ansible-managed: "true"
spec:
  runStrategy: Always
  dataVolumeTemplates:
  - apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    metadata:
      name: eap-vm-root
    spec:
      sourceRef:
        kind: DataSource
        name: fedora
        namespace: openshift-virtualization-os-images
      storage:
        resources:
          requests:
            storage: 30Gi
  template:
    metadata:
      labels:
        app: eap
        role: backend
        ansible-managed: "true"
    spec:
      domain:
        cpu:
          cores: 2
        memory:
          guest: 4Gi
        devices:
          disks:
          - name: rootdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
          rng: {}
      evictionStrategy: LiveMigrate
      networks:
      - name: default
        pod: {}
      accessCredentials:
              - sshPublicKey:
                  source:
                    secret:
                      secretName: vm-ssh-keys
                  propagationMethod:
                    noCloud: {}
      volumes:
      - name: rootdisk
        dataVolume:
          name: eap-vm-root
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |-
            #cloud-config
            hostname: eap-vm
            user: eap
            packages:
              - python3
            runcmd:
              - systemctl enable --now sshd